[package]
name = "kernel"
version = "0.1.0"
edition = "2024"

[dependencies]
buddy_system_allocator = "0.13.0"
fdt = { version = "0.1.5", features = ["pretty-printing"] }
mbrs = { version = "0.3.1", features = ["no-std"], default-features = false }
riscv = { version = "0.16.0", features = ["s-mode"] }
sbi = "0.3.0"
sg200x-bsp = "0.6.0"
